version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pipeline_postgres
    restart: always
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_password
      POSTGRES_DB: telegram_pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d telegram_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scraper_bot:
    build: .
    container_name: pipeline_scraper_bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pipeline:pipeline_password@postgres:5432/telegram_pipeline
      REDIS_URL: redis://redis:6379/0
    command: python -m src.scrapers.userbot_listener
    volumes:
      - ./pipeline_userbot.session:/app/pipeline_userbot.session
      - scratch_data:/app/scratch
      - poster_cache:/app/cache/posters

  arq_worker:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pipeline:pipeline_password@postgres:5432/telegram_pipeline
      REDIS_URL: redis://redis:6379/0
    command: arq src.workers.arq_worker.WorkerSettings
    deploy:
      replicas: 2
    volumes:
      - ./pipeline_userbot.session:/app/pipeline_userbot.session
      - scratch_data:/app/scratch
      - poster_cache:/app/cache/posters

volumes:
  postgres_data:
  redis_data:
  scratch_data:
  poster_cache:
